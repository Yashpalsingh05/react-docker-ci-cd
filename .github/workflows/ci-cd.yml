name: 🚀 React Docker CI/CD Pipeline

# 🔄 Pipeline Triggers
on:
  # Trigger on push to main branch
  push:
    branches: [ main, develop ]
  
  # Trigger on pull requests to main
  pull_request:
    branches: [ main ]
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# 📋 Environment variables for all jobs
env:
  DOCKER_IMAGE_NAME: yashthakur1/react-app
  NODE_VERSION: '18'

jobs:
  # 🔍 Job 1: Code Quality & Security Checks
  quality-checks:
    runs-on: ubuntu-latest
    name: 🔍 Code Quality & Security
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📋 Install Dependencies
      run: |
        echo "📦 Installing npm dependencies..."
        npm ci --silent
        
    - name: 🔍 ESLint Code Analysis
      run: |
        echo "🔍 Running ESLint checks..."
        npm run lint || echo "⚠️ ESLint found issues (non-blocking)"
      continue-on-error: true
      
    - name: 🛡️ Security Vulnerability Scan
      run: |
        echo "🛡️ Scanning for security vulnerabilities..."
        npm audit --audit-level high || echo "⚠️ Security vulnerabilities found (review required)"
        
        echo "🔍 Checking for potential secrets..."
        if grep -r "password\|secret\|key\|token" src/ package.json; then
          echo "⚠️ Potential secrets found - please review"
        else
          echo "✅ No obvious secrets detected"
        fi
      continue-on-error: true
      
    - name: 🧪 Run Unit Tests
      run: |
        echo "🧪 Running unit tests with coverage..."
        npm test -- --coverage --watchAll=false --testResultsProcessor=jest-junit
        
    - name: 📊 Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          coverage/
          junit.xml
        retention-days: 30

  # 🐳 Job 2: Docker Build & Test
  docker-build-test:
    runs-on: ubuntu-latest
    needs: quality-checks
    name: 🐳 Docker Build & Test
    
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🏷️ Generate Image Tag
      id: image-tag
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          TAG="pr-${{ github.event.number }}-${{ github.run_number }}"
        else
          TAG="${{ github.ref_name }}-${{ github.sha }}"
        fi
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "📝 Generated image tag: ${TAG}"
        
    - name: 🔨 Build Docker Image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
        
    - name: 🧪 Test Docker Container
      run: |
        echo "🧪 Testing Docker container..."
        
        # Start container for testing
        docker run -d --name test-container \
          -p 3001:80 \
          ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
        
        # Wait for container startup
        echo "⏳ Waiting for container to start..."
        sleep 15
        
        # Health check
        echo "🏥 Performing health checks..."
        
        # Basic connectivity test
        if curl -f -s http://localhost:3001/; then
          echo "✅ Basic connectivity test passed"
        else
          echo "❌ Basic connectivity test failed"
          docker logs test-container
          exit 1
        fi
        
        # Check if React app loads properly
        RESPONSE=$(curl -s http://localhost:3001/)
        if echo "$RESPONSE" | grep -q "React Docker App"; then
          echo "✅ React application loads correctly"
        else
          echo "❌ React application not loading properly"
          echo "Response: $RESPONSE"
          exit 1
        fi
        
        # Test static asset loading
        if curl -f -s http://localhost:3001/static/js/main.*.js >/dev/null 2>&1; then
          echo "✅ Static assets are accessible"
        else
          echo "⚠️ Static assets check inconclusive (non-critical)"
        fi
        
        echo "🎉 All Docker tests passed!"
        
    - name: 🧹 Cleanup Test Container
      if: always()
      run: |
        docker stop test-container || true
        docker rm test-container || true
        
    - name: 📊 Docker Image Info
      run: |
        echo "📊 Docker Image Information:"
        docker images ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
        
        # Get image size
        SIZE=$(docker images ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }} --format "{{.Size}}")
        echo "📏 Image Size: $SIZE"

  # 🚀 Job 3: Deploy PR Preview (for Pull Requests)
  deploy-preview:
    runs-on: ubuntu-latest
    needs: [quality-checks, docker-build-test]
    if: github.event_name == 'pull_request'
    name: 🚀 Deploy PR Preview
    
    steps:
    - name: 🌐 Create PR Preview Environment
      run: |
        echo "🚀 Setting up PR Preview Environment"
        echo "📝 PR Number: ${{ github.event.number }}"
        echo "🏷️ Image Tag: ${{ needs.docker-build-test.outputs.image-tag }}"
        echo "🌐 Preview URL would be: https://pr-${{ github.event.number }}.preview.yourdomain.com"
        echo "📋 This is where you'd deploy to your staging/preview environment"
        
        # In a real setup, you'd deploy to a preview environment here:
        # - Push image to registry
        # - Deploy to staging cluster  
        # - Update PR with preview URL
        
    - name: 💬 Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **PR Preview Ready!**
            
            ✅ All checks passed
            🐳 Docker image: \`${{ env.DOCKER_IMAGE_NAME }}:${{ needs.docker-build-test.outputs.image-tag }}\`
            🌐 Preview URL: \`https://pr-${{ github.event.number }}.preview.yourdomain.com\`
            
            **Test Results:**
            - ✅ Code quality checks passed
            - ✅ Security scan completed  
            - ✅ Unit tests passed
            - ✅ Docker build successful
            - ✅ Container health checks passed`
          })

  # 🌟 Job 4: Production Deploy (main branch only)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [quality-checks, docker-build-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: 🌟 Production Deployment
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: 🏷️ Generate Production Tags
      id: tags
      run: |
        echo "latest=true" >> $GITHUB_OUTPUT
        echo "version=v${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        
    - name: 🚀 Build & Push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE_NAME }}:latest
          ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.tags.outputs.version }}
          ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: 🌟 Deploy to Production
      run: |
        echo "🌟 Deploying to Production Environment"
        echo "🐳 Image: ${{ env.DOCKER_IMAGE_NAME }}:latest"
        echo "📝 Version: ${{ steps.tags.outputs.version }}"
        echo "🌐 Production URL: https://yourdomain.com"
        
        # In a real production setup, you'd:
        # - Deploy to production cluster (Kubernetes, ECS, etc.)
        # - Update load balancer
        # - Run smoke tests
        # - Send notifications
        
        echo "✅ Production deployment completed successfully!"

  # 📢 Job 5: Notifications & Reporting
  notify:
    runs-on: ubuntu-latest
    needs: [quality-checks, docker-build-test, deploy-preview, deploy-production]
    if: always()
    name: 📢 Notifications
    
    steps:
    - name: 📊 Generate Summary Report
      run: |
        echo "📊 Pipeline Execution Summary"
        echo "=================================="
        echo "🔹 Repository: ${{ github.repository }}"
        echo "🔹 Branch/PR: ${{ github.ref_name }}"
        echo "🔹 Commit: ${{ github.sha }}"
        echo "🔹 Triggered by: ${{ github.event_name }}"
        echo "🔹 Run Number: ${{ github.run_number }}"
        echo ""
        echo "📋 Job Results:"
        echo "  Quality Checks: ${{ needs.quality-checks.result }}"
        echo "  Docker Build: ${{ needs.docker-build-test.result }}"
        echo "  Preview Deploy: ${{ needs.deploy-preview.result || 'skipped' }}"
        echo "  Production Deploy: ${{ needs.deploy-production.result || 'skipped' }}"
        
    - name: ✅ Success Notification
      if: ${{ needs.quality-checks.result == 'success' && needs.docker-build-test.result == 'success' }}
      run: |
        echo "🎉 Pipeline completed successfully!"
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "✅ PR #${{ github.event.number }} is ready for review"
        else
          echo "✅ Changes deployed to production"  
        fi
        
    - name: ❌ Failure Notification
      if: ${{ needs.quality-checks.result == 'failure' || needs.docker-build-test.result == 'failure' }}
      run: |
        echo "❌ Pipeline failed!"
        echo "🔍 Please check the failed jobs for details"
        echo "📋 Failed jobs need attention before merging"
        
    - name: 📤 Upload Pipeline Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pipeline-summary
        path: |
          ${{ github.workspace }}
        retention-days: 7